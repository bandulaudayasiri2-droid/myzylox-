<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MyZylox — Supabase Cloud Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0f0f0f; color: #f1f1f1; padding: 16px; }
        .header { position: sticky; top: 0; background: #0f0f0fcc; backdrop-filter: blur(18px); border-bottom: 1px solid #272727; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; z-index: 110; }
        .logo-area { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo-icon { font-size: 28px; color: #ff4d4d; }
        .logo-text { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #ff4d4d, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-bar { flex: 1; display: flex; background: #1e1e1e; border-radius: 40px; overflow: hidden; border: 1px solid #3a3a3a; }
        .search-bar input { flex: 1; background: transparent; border: none; padding: 10px 16px; color: white; font-size: 0.85rem; outline: none; }
        .search-bar button { background: #2c2c2c; border: none; padding: 0 16px; color: white; cursor: pointer; }
        .auth-btn { background: #ff4d4d; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; }
        .container { max-width: 100%; margin: 0 auto; padding: 16px; }
        .section-title { font-size: 1.3rem; font-weight: 600; margin: 20px 0 12px 0; border-left: 4px solid #ff4d4d; padding-left: 12px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .video-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: #0a0a0a; }
        .card-info { padding: 10px; display: flex; gap: 10px; }
        .video-title { font-weight: 600; font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px; padding: 20px; }
        .login-card { background: #1c1c1c; border-radius: 32px; padding: 32px; text-align: center; max-width: 350px; width: 100%; }
        .login-card h1 { font-size: 2rem; background: linear-gradient(135deg, #ff4d4d, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .upload-section { background: #141414; border-radius: 20px; padding: 16px; margin: 16px 0; }
        input, textarea { background: #2a2a2a; border: 1px solid #3a3a3a; padding: 12px; border-radius: 40px; color: white; width: 100%; margin-bottom: 12px; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #ff4d4d; padding: 12px; border-radius: 40px; z-index: 2001; color: white; text-align: center; animation: fadeInUp 0.2s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h1>MyZylox</h1>
        <p>🌍 ඔබගේ Google ගිණුමෙන් පුරනය වන්න</p>
        <p style="font-size: 14px; color: #10b981;">✨ Supabase Cloud ✨</p>
        <button id="googleSignInBtn" class="auth-btn" style="margin-top: 20px; width: 100%;">
            <i class="fab fa-google"></i> Sign in with Google
        </button>
        <div style="margin-top: 20px; font-size: 11px; color: #666;">✨ සියලුම ගිණුම් වල videos එකිනෙකාට පෙනේ! ✨</div>
    </div>
</div>

<div class="header" id="mainHeader" style="display: none;">
    <div class="logo-area" id="homeLogo">
        <i class="fas fa-play-circle logo-icon"></i>
        <span class="logo-text">MyZylox</span>
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search...">
        <button id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
    <button id="uploadBtn" class="auth-btn" style="padding: 8px 16px;">+</button>
</div>
<div class="container" id="mainContainer" style="display: none;"></div>

<script>
const SUPABASE_URL = "https://huzcuspzhqttbujcfpcw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_2Xxi-VeACFEGYziBBNSY4g_NK-Ki6rm";

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let videosList = [];
let usersList = [];

function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = isError ? '#d32f2f' : '#ff4d4d';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// Handle Google Sign In
async function handleGoogleSignIn() {
    try {
        const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.href
            }
        });
        if (error) throw error;
    } catch (error) {
        showToast("Sign-in failed: " + error.message, true);
    }
}

// Check session on page load
async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    
    if (session) {
        const { data: existingUser } = await supabase
            .from('users')
            .select('*')
            .eq('id', session.user.id)
            .single();
        
        if (!existingUser) {
            await supabase.from('users').insert({
                id: session.user.id,
                email: session.user.email,
                display_name: session.user.user_metadata.full_name || session.user.email.split('@')[0],
                avatar_url: session.user.user_metadata.avatar_url
            });
        }
        
        currentUser = {
            id: session.user.id,
            email: session.user.email,
            displayName: session.user.user_metadata.full_name || session.user.email.split('@')[0],
            avatar: session.user.user_metadata.avatar_url
        };
        
        localStorage.setItem('myzylox_session', JSON.stringify({ userId: session.user.id, expires: Date.now() + 7*24*60*60*1000 }));
        
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainHeader').style.display = 'flex';
        document.querySelector('.container').style.display = 'block';
        await loadAllData();
        renderHome();
        showToast(`Welcome ${currentUser.displayName}!`);
        return true;
    }
    return false;
}

// Listen for auth changes
supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN') {
        window.location.reload();
    }
});

async function loadAllData() {
    try {
        const { data: users } = await supabase.from('users').select('*');
        usersList = users || [];
        
        const { data: videos } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
        videosList = videos || [];
        
        console.log(`Loaded: ${usersList.length} users, ${videosList.length} videos`);
    } catch (error) {
        console.error("Error:", error);
    }
}

async function uploadVideo(title, file) {
    if (!title || !file) throw new Error("Missing");
    if (file.size > 200 * 1024 * 1024) throw new Error("Max 200 MB");
    
    showToast("📤 Uploading...");
    
    const videoId = `vid_${Date.now()}`;
    const fileName = `${videoId}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
    
    const { error: uploadError } = await supabase.storage.from('videos').upload(fileName, file);
    if (uploadError) throw uploadError;
    
    const { data: { publicUrl } } = supabase.storage.from('videos').getPublicUrl(fileName);
    
    const { error: dbError } = await supabase.from('videos').insert({
        id: videoId,
        user_id: currentUser.id,
        title: title,
        video_url: publicUrl,
        views: 0
    });
    
    if (dbError) throw dbError;
    
    videosList.unshift({ id: videoId, user_id: currentUser.id, title: title, video_url: publicUrl });
    showToast(`✅ "${title}" uploaded!`);
}

async function renderVideoGrid(videoArray, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    
    if (videoArray.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px;">✨ No videos yet</div>';
        return;
    }
    
    for (let vid of videoArray) {
        const owner = usersList.find(u => u.id === vid.user_id);
        if (!owner) continue;
        
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <div class="thumbnail"><img src="" style="width:100%;height:100%;object-fit:cover;" alt="thumb"></div>
            <div class="card-info">
                <div class="video-details">
                    <div class="video-title">${escapeHtml(vid.title)}</div>
                    <div style="font-size:12px; color:#aaa;">${escapeHtml(owner.display_name)}</div>
                </div>
            </div>
        `;
        card.onclick = () => openWatchPage(vid);
        container.appendChild(card);
    }
}

function escapeHtml(str) {
    return String(str || '').replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

async function openWatchPage(video) {
    const owner = usersList.find(u => u.id === video.user_id);
    const html = `
        <div>
            <video src="${video.video_url}" style="width:100%; max-height:50vh;" controls autoplay></video>
            <h2>${escapeHtml(video.title)}</h2>
            <div><strong>${escapeHtml(owner?.display_name)}</strong></div>
            <button onclick="location.reload()" class="auth-btn" style="margin-top:16px;">Back</button>
        </div>
    `;
    document.getElementById('mainContainer').innerHTML = html;
}

async function renderHome() {
    let html = `
        <div class="section-title">Latest Videos 🌍</div>
        <div class="video-grid" id="latestGrid"></div>
        ${currentUser ? `
        <div class="upload-section">
            <h3>📤 Upload Video</h3>
            <input type="text" id="uploadTitle" placeholder="Video title">
            <input type="file" id="uploadFile" accept="video/mp4,video/webm">
            <button id="doUploadBtn" class="auth-btn" style="width:100%;">Publish</button>
        </div>` : ''}
    `;
    document.getElementById('mainContainer').innerHTML = html;
    await renderVideoGrid(videosList.slice(0, 10), 'latestGrid');
    
    if (currentUser) {
        document.getElementById('doUploadBtn')?.addEventListener('click', async () => {
            const title = document.getElementById('uploadTitle').value.trim();
            const file = document.getElementById('uploadFile').files[0];
            if (title && file) {
                try {
                    await uploadVideo(title, file);
                    await loadAllData();
                    renderHome();
                } catch (e) {
                    showToast(e.message, true);
                }
            } else {
                showToast("Title and file required", true);
            }
        });
    }
}

async function bootstrap() {
    document.getElementById('googleSignInBtn').onclick = () => handleGoogleSignIn();
    document.getElementById('homeLogo').onclick = () => renderHome();
    document.getElementById('uploadBtn').onclick = () => {
        if (currentUser) {
            document.getElementById('uploadTitle')?.focus();
        } else {
            showToast("Please sign in first", true);
        }
    };
    
    await checkSession();
    
    if (!currentUser) {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('mainHeader').style.display = 'none';
        document.querySelector('.container').style.display = 'none';
    }
}

bootstrap();
</script>
</body>
</html>
