<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0f0f0f; color: #f1f1f1; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }

        .header { position: sticky; top: 0; background: #0f0f0fcc; backdrop-filter: blur(18px); border-bottom: 1px solid #272727; padding: 8px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; z-index: 110; display: none; }
        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon { font-size: 32px; color: #ff4d4d; }
        .logo-text { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #ff4d4d, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-bar { flex: 1; max-width: 600px; display: flex; background: #1e1e1e; border-radius: 40px; overflow: hidden; border: 1px solid #3a3a3a; }
        .search-bar input { flex: 1; background: transparent; border: none; padding: 12px 20px; color: white; font-size: 0.9rem; outline: none; }

        .avatar { width: 38px; height: 38px; background: #ff6b4a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; background-size: cover; background-position: center; }
        .nav-links { display: flex; gap: 8px; background: #1a1a1a; padding: 4px 8px; border-radius: 60px; }
        .nav-btn { background: transparent; border: none; color: #ccc; font-weight: 500; padding: 8px 20px; border-radius: 40px; cursor: pointer; transition: 0.1s; }

        .container { max-width: 1600px; margin: 0 auto; padding: 24px 28px; display: none; }
        .section-title { font-size: 1.5rem; font-weight: 600; margin: 24px 0 16px 0; border-left: 5px solid #ff4d4d; padding-left: 16px; }

        .duration-badge { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.8); padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 500; }
        .card-info { padding: 12px; display: flex; gap: 12px; }
        .channel-avatar-mini { width: 36px; height: 36px; background: #ff6b4a; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background-size: cover; }

        .stats-row { display: flex; gap: 14px; font-size: 0.7rem; color: #aaa; margin-top: 6px; }

        .watch-player { position: relative; background: #000; border-radius: 20px; overflow: hidden; }
        .watch-player video { width: 100%; display: block; background: black; max-height: 65vh; outline: none; }
        .custom-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.85), transparent); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .watch-player:hover .custom-controls { opacity: 1; pointer-events: auto; }
        .control-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 6px; border-radius: 50%; transition: 0.1s; }
        .control-btn:hover { background: rgba(255,255,255,0.2); }
        .time-display { font-size: 14px; color: white; font-family: monospace; }
        .volume-slider { width: 80px; cursor: pointer; background: #555; height: 4px; border-radius: 2px; }
        .progress-bar-container { flex: 1; display: flex; align-items: center; gap: 8px; }
        .progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-filled { height: 100%; background: #ff4d4d; width: 0%; border-radius: 2px; position: relative; }
        .progress-buffered { height: 100%; background: rgba(255,255,255,0.2); width: 0%; border-radius: 2px; position: absolute; top: 0; left: 0; }
        .settings-dropdown { position: absolute; bottom: 50px; right: 20px; background: #1e1e1e; border-radius: 16px; padding: 12px; display: none; flex-direction: column; gap: 12px; min-width: 180px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); border: 1px solid #3a3a3a; z-index: 150; }
        .settings-dropdown button { background: #2a2a2a; border: none; color: white; padding: 6px 12px; border-radius: 30px; margin: 4px; cursor: pointer; font-size: 0.8rem; }
        .settings-dropdown button:hover { background: #ff4d4d; }
        .watch-player.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10000; border-radius: 0; background: black; display: flex; align-items: center; justify-content: center; }
        
        .channel-info { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #2a2a2a; border-bottom: 1px solid #2a2a2a; padding: 12px 0; margin: 12px 0; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
        .action-btn { background: #272727; border: none; padding: 8px 18px; border-radius: 40px; color: white; cursor: pointer; font-weight: 500; transition: 0.1s; }
        .comment-item { background: #1e1e1e; border-radius: 16px; padding: 12px; margin-bottom: 12px; }

        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 32px; }
        .login-card { background: #1c1c1c; border-radius: 40px; padding: 48px; text-align: center; max-width: 450px; width: 90%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .login-card h1 { font-size: 2.5rem; margin-bottom: 16px; background: linear-gradient(135deg, #ff4d4d, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-card p { color: #aaa; margin-bottom: 32px; }
        .upload-section { background: #141414; border-radius: 28px; padding: 24px; margin: 20px 0; border: 1px solid #2a2a2a; }
        .upload-dropzone { border: 2px dashed #3a3a3a; border-radius: 28px; padding: 40px; text-align: center; transition: 0.2s; cursor: pointer; }
        .toast { position: fixed; bottom: 24px; left: 24px; background: #ff4d4d; padding: 12px 24px; border-radius: 40px; z-index: 2001; color: white; font-weight: 500; animation: fadeInUp 0.2s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        input, textarea { background: #2a2a2a; border: 1px solid #3a3a3a; padding: 12px 16px; border-radius: 40px; color: white; width: 100%; margin-bottom: 12px; outline: none; }

        @media (max-width: 700px) { .header { flex-direction: column; align-items: stretch; } .nav-links { justify-content: center; } }

<!-- MAIN APP (hidden until login) -->

<script>
// ======================= GOOGLE CLIENT ID (Updated with your new ID) =======================
const GOOGLE_CLIENT_ID = "773537760509-6n28mka1p38oja67vqee6drn89isqeh9.apps.googleusercontent.com";

// ---------- DATA STORAGE (localStorage + IndexedDB) ----------
const SESSION_EXPIRY_MS = 7 * 24 * 60 * 60 * 1000;
const MAX_VIDEO_SIZE_MB = 200;
const ALLOWED_VIDEO_TYPES = ['video/mp4', 'video/webm', 'video/ogg'];
const STORAGE = {
    USERS: 'myzylox_users', VIDEOS: 'myzylox_videos', LIKES: 'myzylox_likes', DISLIKES: 'myzylox_dislikes',
    FOLLOWS: 'myzylox_follows', COMMENTS: 'myzylox_comments', PLAYLISTS: 'myzylox_playlists',
    PLAYLIST_ITEMS: 'myzylox_playlist_items', WATCHLATER: 'myzylox_watchlater', VIEWS: 'myzylox_views',
    NOTIFICATIONS: 'myzylox_notifications', WATCH_HISTORY: 'myzylox_watch_history', THUMBNAILS: 'myzylox_thumbnails'
};

let users = [], videos = [], likes = [], dislikes = [], follows = [], comments = [], playlists = [], playlistItems = [], views = [], notifications = [], watchHistory = [];
let currentUser = null;
let activeView = "home";
let currentWatchVideo = null;
let searchDebounceTimer = null;
let currentVideoElement = null;
let dbReady = false;
const DB_NAME = 'MyZyloxMediaV2';

// IndexedDB
function initIndexedDB() {
    return new Promise((resolve) => {
        const req = indexedDB.open(DB_NAME, 3);
        req.onupgradeneeded = (e) => {
            let db = e.target.result;
            if (!db.objectStoreNames.contains('videoFiles')) db.createObjectStore('videoFiles', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('thumbnails')) db.createObjectStore('thumbnails', { keyPath: 'videoId' });
        };
        req.onsuccess = (e) => { window.db = e.target.result; dbReady = true; resolve(); };
        req.onerror = () => resolve();
    });
}
async function saveVideoBlob(id, blob) { if(!dbReady) await initIndexedDB(); const tx = window.db.transaction('videoFiles', 'readwrite'); tx.objectStore('videoFiles').put({ id, blob }); return new Promise(r => tx.oncomplete = r); }
async function getVideoBlob(id) { if(!dbReady) await initIndexedDB(); const tx = window.db.transaction('videoFiles', 'readonly'); return new Promise(resolve => { const req = tx.objectStore('videoFiles').get(id); req.onsuccess = () => resolve(req.result ? req.result.blob : null); }); }
async function saveThumbnail(videoId, blob) { if(!dbReady) await initIndexedDB(); const tx = window.db.transaction('thumbnails', 'readwrite'); tx.objectStore('thumbnails').put({ videoId, blob }); return new Promise(r => tx.oncomplete = r); }
async function getThumbnail(videoId) { if(!dbReady) await initIndexedDB(); const tx = window.db.transaction('thumbnails', 'readonly'); return new Promise(resolve => { const req = tx.objectStore('thumbnails').get(videoId); req.onsuccess = () => resolve(req.result ? URL.createObjectURL(req.result.blob) : null); }); }

function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function showToast(msg, isError=false) { let toast=document.createElement('div'); toast.className='toast'; toast.style.background = isError ? '#d32f2f' : '#ff4d4d'; toast.innerText=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(), 3000); }

function saveAll() {
    localStorage.setItem(STORAGE.USERS, JSON.stringify(users));
    localStorage.setItem(STORAGE.VIDEOS, JSON.stringify(videos.map(v => ({ ...v, blobUrl: undefined }))));
    localStorage.setItem(STORAGE.LIKES, JSON.stringify(likes));
    localStorage.setItem(STORAGE.DISLIKES, JSON.stringify(dislikes));
    localStorage.setItem(STORAGE.FOLLOWS, JSON.stringify(follows));
    localStorage.setItem(STORAGE.COMMENTS, JSON.stringify(comments));
    localStorage.setItem(STORAGE.PLAYLISTS, JSON.stringify(playlists));
    localStorage.setItem(STORAGE.PLAYLIST_ITEMS, JSON.stringify(playlistItems));
    localStorage.setItem(STORAGE.VIEWS, JSON.stringify(views));
    localStorage.setItem(STORAGE.NOTIFICATIONS, JSON.stringify(notifications));
    localStorage.setItem(STORAGE.WATCH_HISTORY, JSON.stringify(watchHistory));
}

function loadAll() {
    users = JSON.parse(localStorage.getItem(STORAGE.USERS) || '[]');
    videos = JSON.parse(localStorage.getItem(STORAGE.VIDEOS) || '[]');
    likes = JSON.parse(localStorage.getItem(STORAGE.LIKES) || '[]');
    dislikes = JSON.parse(localStorage.getItem(STORAGE.DISLIKES) || '[]');
    follows = JSON.parse(localStorage.getItem(STORAGE.FOLLOWS) || '[]');
    comments = JSON.parse(localStorage.getItem(STORAGE.COMMENTS) || '[]');
    playlists = JSON.parse(localStorage.getItem(STORAGE.PLAYLISTS) || '[]');
    playlistItems = JSON.parse(localStorage.getItem(STORAGE.PLAYLIST_ITEMS) || '[]');
    views = JSON.parse(localStorage.getItem(STORAGE.VIEWS) || '[]');
    notifications = JSON.parse(localStorage.getItem(STORAGE.NOTIFICATIONS) || '[]');
    watchHistory = JSON.parse(localStorage.getItem(STORAGE.WATCH_HISTORY) || '[]');
}

// Clean any fake users without googleId
function cleanFakeUsers() {
    const hasNonGoogle = users.some(u => !u.googleId);
    if (!hasNonGoogle) return false;
    users = [];
    videos = [];
    likes = [];
    dislikes = [];
    follows = [];
    comments = [];
    playlists = [];
    playlistItems = [];
    views = [];
    notifications = [];
    watchHistory = [];
    Object.values(STORAGE).forEach(key => localStorage.removeItem(key));
    return true;
}

// Google Sign-In callback
function handleGoogleCredentialResponse(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const googleUser = {
        id: payload.sub,
        email: payload.email,
        name: payload.name,
        picture: payload.picture
    };
    let user = users.find(u => u.googleId === googleUser.id);
    if (!user) {
        user = {
            id: googleUser.id,
            googleId: googleUser.id,
            email: googleUser.email,
            displayName: googleUser.name,
            username: googleUser.email.split('@')[0],
            avatar: googleUser.picture,
            createdAt: Date.now()
        };
        users.push(user);
        saveAll();
        showToast(`සාදරයෙන් පිළිගනිමු ${user.displayName}!`);
    } else {
        user.displayName = googleUser.name;
        user.avatar = googleUser.picture;
        saveAll();
        showToast(`ආපසු සාදරයෙන් පිළිගනිමු, ${user.displayName}!`);
    }
    saveSession(user);
    hideLoginOverlayAndShowApp();
}

function saveSession(user) {
    const sessionData = { userId: user.id, expires: Date.now() + SESSION_EXPIRY_MS };
    localStorage.setItem('myzylox_session', JSON.stringify(sessionData));
    currentUser = user;
}

function loadSessionFromStorage() {
    const sess = localStorage.getItem('myzylox_session');
    if (sess) {
        try {
            const { userId, expires } = JSON.parse(sess);
            if (expires && expires > Date.now()) {
                const found = users.find(u => u.id === userId);
                if (found) {
                    currentUser = found;
                    hideLoginOverlayAndShowApp();
                    return true;
                }
            }
        } catch(e) {}
    }
    return false;
}

function hideLoginOverlayAndShowApp() {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainHeader').style.display = 'flex';
    document.querySelector('.container').style.display = 'block';
    updateUIUser();
    renderNotificationBadge();
    renderHome();
}

function logout() {
    localStorage.removeItem('myzylox_session');
    currentUser = null;
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('mainHeader').style.display = 'none';
    document.querySelector('.container').style.display = 'none';
    if (google && google.accounts) google.accounts.id.disableAutoSelect();
    showToast("Logged out.");
}

function updateUIUser() {
    const area = document.getElementById('userArea');
    if (!area) return;
    if (currentUser) {
        const avatarStyle = currentUser.avatar ? `background-image: url(${currentUser.avatar}); background-size: cover;` : '';
        area.innerHTML = `
            <button id="uploadNavBtn" class="icon-btn"><i class="fas fa-upload"></i></button>
            <div class="avatar" id="avatarBtn" style="${avatarStyle}">${currentUser.avatar ? '' : currentUser.displayName.charAt(0)}</div>
            <button id="logoutBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
            <div class="icon-btn" id="bellIcon"><i class="fas fa-bell"></i><span id="notifBadge" class="notif-badge" style="display:none;"></span></div>
        `;
        document.getElementById('logoutBtn').onclick = () => logout();
        document.getElementById('avatarBtn').onclick = () => showChannelPage(currentUser.id);
        document.getElementById('uploadNavBtn').onclick = () => { renderUploadPage(); activeView='upload'; setActiveNav('upload'); };
        renderNotificationBadge();
    }
}

function initGoogleSignIn() {
    if (typeof google === 'undefined') {
        setTimeout(initGoogleSignIn, 200);
        return;
    }
    google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
    });
    google.accounts.id.renderButton(
        document.getElementById('googleLoginButton'),
        { theme: 'outline', size: 'large', width: 300 }
    );
    google.accounts.id.prompt();
}

// ---------- VIDEO PLATFORM FUNCTIONS (Full implementation) ----------
async function uploadVideo(title, file) {
    if(!title || !file) throw new Error("Missing title or file");
    if (!ALLOWED_VIDEO_TYPES.includes(file.type)) throw new Error("Invalid format");
    if (file.size > MAX_VIDEO_SIZE_MB * 1024 * 1024) throw new Error(`Max ${MAX_VIDEO_SIZE_MB} MB`);
    const blobId = `blob_${Date.now()}_${Math.random()}`;
    await saveVideoBlob(blobId, file);
    const objectUrl = URL.createObjectURL(file);
    const tags = title.toLowerCase().split(' ').filter(w => w.length>2).slice(0,5);
    const newVideo = { 
        id: `vid_${Date.now()}_${Math.random()}`,
        userId: currentUser.id,
        title: escapeHtml(title).substring(0,100),
        videoType: "blob",
        blobId,
        blobUrl: objectUrl,
        uploadDate: Date.now(),
        tags,
        duration: "0:00"
    };
    videos.unshift(newVideo);
    saveAll();
    generateThumbnail(file, newVideo.id);
    const followersList = follows.filter(f => f.followedId === currentUser.id).map(f => f.followerId);
    followersList.forEach(uid => addNotification(uid, `📹 ${currentUser.displayName} uploaded "${newVideo.title}"`));
    return newVideo;
}

async function generateThumbnail(videoBlob, videoId) {
    return new Promise((resolve) => {
        const video = document.createElement('video');
        video.preload = 'metadata';
        video.muted = true;
        video.src = URL.createObjectURL(videoBlob);
        video.onloadeddata = () => {
            video.currentTime = 1;
            video.onseeked = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(async (blob) => { if(blob) await saveThumbnail(videoId, blob); URL.revokeObjectURL(video.src); resolve(); }, 'image/jpeg', 0.7);
            };
            if(video.readyState >= 2) video.currentTime = 1;
            else video.oncanplay = () => { video.currentTime = 1; };
        };
        video.onerror = () => resolve();
    });
}

function getUserById(id) { return users.find(u => u.id === id); }
function getVideoViews(videoId) { return views.filter(v => v.videoId === videoId).length; }
function getLikeCount(videoId) { return likes.filter(l => l.videoId === videoId).length; }
function getDislikeCount(videoId) { return dislikes.filter(d => d.videoId === videoId).length; }
function isLiked(videoId, userId) { return likes.some(l => l.videoId === videoId && l.userId === userId); }
function isDisliked(videoId, userId) { return dislikes.some(d => d.videoId === videoId && d.userId === userId); }
function isFollowing(follower, followed) { return follows.some(f => f.followerId === follower && f.followedId === followed); }
function getFollowerCount(userId) { return follows.filter(f => f.followedId === userId).length; }
function addNotification(targetUserId, message) { notifications.unshift({ id: Date.now()+Math.random(), userId: targetUserId, message, timestamp: Date.now(), read: false }); saveAll(); renderNotificationBadge(); }
function recordView(videoId) { if(currentUser) { views.push({ videoId, userId: currentUser.id, timestamp: Date.now() }); saveAll(); } }
function recordWatch(videoId) { if(currentUser) { watchHistory = watchHistory.filter(w => !(w.userId === currentUser.id && w.videoId === videoId)); watchHistory.unshift({ userId: currentUser.id, videoId, timestamp: Date.now() }); if(watchHistory.length > 200) watchHistory.pop(); saveAll(); } }

function getRecommendedVideos(limit=20, excludeId=null) {
    let candidates = [...videos];
    if(excludeId) candidates = candidates.filter(v => v.id !== excludeId);
    if(!currentUser || watchHistory.filter(w=>w.userId===currentUser.id).length===0) {
        return candidates.sort((a,b)=>b.uploadDate - a.uploadDate).slice(0,limit);
    }
    const historyIds = watchHistory.filter(w=>w.userId===currentUser.id).map(w=>w.videoId);
    const watched = videos.filter(v=>historyIds.includes(v.id));
    const tagScores = new Map();
    watched.forEach(v=>{ v.tags?.forEach(t=>{ tagScores.set(t, (tagScores.get(t)||0)+1); }); });
    candidates = candidates.filter(v=>!historyIds.includes(v.id));
    const scored = candidates.map(v => {
        let score=0; v.tags?.forEach(t=>{ if(tagScores.has(t)) score+=tagScores.get(t); });
        return {...v, recoScore:score};
    });
    scored.sort((a,b)=> (b.recoScore||0)-(a.recoScore||0) || b.uploadDate-a.uploadDate);
    return scored.slice(0,limit);
}
function getTrendingVideos(limit=10) {
    const weekAgo=Date.now()-7*24*3600000;
    const recentViews=views.filter(v=>v.timestamp>weekAgo);
    const recentLikes=likes.filter(l=>videos.find(vid=>vid.id===l.videoId)?.uploadDate>weekAgo);
    const recentComments=comments.filter(c=>videos.find(v=>v.id===c.videoId)?.uploadDate>weekAgo);
    const scoreMap=new Map();
    recentViews.forEach(v=>scoreMap.set(v.videoId,(scoreMap.get(v.videoId)||0)+1));
    recentLikes.forEach(l=>scoreMap.set(l.videoId,(scoreMap.get(l.videoId)||0)+2));
    recentComments.forEach(c=>scoreMap.set(c.videoId,(scoreMap.get(c.videoId)||0)+1));
    return [...videos].sort((a,b)=>(scoreMap.get(b.id)||0)-(scoreMap.get(a.id)||0)).slice(0,limit);
}

async function renderVideoGrid(videoArray, containerId) {
    const container = document.getElementById(containerId);
    if(!container) return;
    container.innerHTML = '';
    if(videoArray.length===0){ container.innerHTML='<div class="empty-state">✨ No videos yet.</div>'; return; }
    for(let vid of videoArray){
        const owner = getUserById(vid.userId);
        if(!owner) continue;
        let thumbUrl = await getThumbnail(vid.id) || '';
        const card = document.createElement('div'); card.className = 'video-card';
        card.innerHTML = `
            <div class="thumbnail"><img loading="lazy" src="${thumbUrl || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 16 9\'%3E%3Crect width=\'100%25\' height=\'100%25\' fill=\'%23222\'/%3E%3C/svg%3E'}" alt="thumb"><span class="duration-badge">${vid.duration||'0:00'}</span></div>
            <div class="card-info"><div class="channel-avatar-mini" style="${owner.avatar?`background-image:url(${owner.avatar});background-size:cover;`:''}">${owner.avatar?'':(owner.displayName?.charAt(0)||'U')}</div><div class="video-details"><div class="video-title">${escapeHtml(vid.title)}</div><div class="creator-name" data-user="${vid.userId}"><i class="fas fa-user-circle"></i> ${escapeHtml(owner.displayName)}</div><div class="stats-row"><span><i class="fas fa-eye"></i> ${getVideoViews(vid.id)}</span><span><i class="fas fa-thumbs-up"></i> ${getLikeCount(vid.id)}</span></div></div></div>
        `;
        card.querySelector('.thumbnail').addEventListener('click', () => openWatchPage(vid));
        card.querySelector('.creator-name').addEventListener('click', (e) => { e.stopPropagation(); showChannelPage(vid.userId); });
        container.appendChild(card);
    }
}

function initCustomControls(videoElement, containerId) {
    const container = document.getElementById(containerId);
    if(!container) return;
    const old = container.querySelector('.custom-controls');
    if(old) old.remove();
    container.insertAdjacentHTML('beforeend', `
        <div class="custom-controls">
            <button class="control-btn play-pause"><i class="fas fa-play"></i></button>
            <div class="time-display">0:00 / 0:00</div>
            <div class="progress-bar-container"><div class="progress-bar"><div class="progress-buffered"></div><div class="progress-filled"></div></div></div>
            <button class="control-btn volume-btn"><i class="fas fa-volume-up"></i></button>
            <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="1">
            <button class="control-btn settings-btn"><i class="fas fa-cog"></i></button>
            <button class="control-btn fullscreen-btn"><i class="fas fa-expand"></i></button>
            <div class="settings-dropdown">
                <div><strong>Playback Speed</strong></div>
                <div class="speed-buttons"><button data-speed="0.5">0.5x</button><button data-speed="1">1x</button><button data-speed="1.5">1.5x</button><button data-speed="2">2x</button></div>
                <hr><div><strong>Quality</strong></div>
                <div class="quality-buttons"><button data-quality="auto">Auto</button><button data-quality="source">Original</button></div>
                <div style="font-size:11px;color:#aaa;text-align:center;">*Multi-quality needs server transcoding</div>
            </div>
        </div>
    `);
    const playPause = container.querySelector('.play-pause');
    const timeDisplay = container.querySelector('.time-display');
    const progressBar = container.querySelector('.progress-bar');
    const progressFilled = container.querySelector('.progress-filled');
    const volumeBtn = container.querySelector('.volume-btn');
    const volumeSlider = container.querySelector('.volume-slider');
    const settingsBtn = container.querySelector('.settings-btn');
    const settingsDropdown = container.querySelector('.settings-dropdown');
    const fullscreenBtn = container.querySelector('.fullscreen-btn');

    function updatePlayPause(){ playPause.innerHTML = videoElement.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>'; }
    function updateTime(){ const cur = videoElement.currentTime; const dur = videoElement.duration; if(!isNaN(dur)){ timeDisplay.innerText = `${Math.floor(cur/60)}:${Math.floor(cur%60).toString().padStart(2,'0')} / ${Math.floor(dur/60)}:${Math.floor(dur%60).toString().padStart(2,'0')}`; progressFilled.style.width = `${(cur/dur)*100}%`; } }
    videoElement.addEventListener('play', updatePlayPause);
    videoElement.addEventListener('pause', updatePlayPause);
    videoElement.addEventListener('timeupdate', updateTime);
    videoElement.addEventListener('loadedmetadata', updateTime);
    playPause.addEventListener('click', () => videoElement.paused ? videoElement.play() : videoElement.pause());
    progressBar.addEventListener('click', (e) => { const rect = progressBar.getBoundingClientRect(); const percent = (e.clientX - rect.left)/rect.width; videoElement.currentTime = percent * videoElement.duration; });
    volumeSlider.addEventListener('input', (e) => { videoElement.volume = e.target.value; volumeBtn.innerHTML = videoElement.volume===0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>'; });
    volumeBtn.addEventListener('click', () => { if(videoElement.volume>0){ videoElement.volume=0; volumeSlider.value=0; volumeBtn.innerHTML='<i class="fas fa-volume-mute"></i>'; } else { videoElement.volume=1; volumeSlider.value=1; volumeBtn.innerHTML='<i class="fas fa-volume-up"></i>'; } });
    settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); const vis = settingsDropdown.style.display==='flex'; settingsDropdown.style.display = vis ? 'none' : 'flex'; });
    document.addEventListener('click', (e) => { if(settingsDropdown && !settingsDropdown.contains(e.target) && e.target !== settingsBtn) settingsDropdown.style.display = 'none'; });
    document.querySelectorAll('[data-speed]').forEach(btn => btn.addEventListener('click', () => { videoElement.playbackRate = parseFloat(btn.dataset.speed); settingsDropdown.style.display='none'; showToast(`Speed: ${btn.dataset.speed}x`); }));
    document.querySelectorAll('[data-quality]').forEach(btn => btn.addEventListener('click', () => { settingsDropdown.style.display='none'; showToast(`Quality: ${btn.dataset.quality} (only source available)`); }));
    fullscreenBtn.addEventListener('click', () => { if(!document.fullscreenElement) container.requestFullscreen().catch(e=>showToast(e.message,true)); else document.exitFullscreen(); });
    document.addEventListener('fullscreenchange', () => { if(document.fullscreenElement === container) container.classList.add('fullscreen'); else container.classList.remove('fullscreen'); });
}

    async function handleDislike(){ if(!currentUser){ logout(); return; } const wasDisliked = isDisliked(vid.id, currentUser.id); if(wasDisliked) dislikes = dislikes.filter(d=>!(d.videoId===vid.id && d.userId===currentUser.id)); else { likes = likes.filter(l=>!(l.videoId===vid.id && l.userId===currentUser.id)); dislikes.push({videoId:vid.id, userId:currentUser.id}); } saveAll(); likeSpan.innerText=getLikeCount(vid.id); dislikeSpan.innerText=getDislikeCount(vid.id); likeBtn.style.background=isLiked(vid.id, currentUser.id)?'#ff4d4d':'#272727'; dislikeBtn.style.background=isDisliked(vid.id, currentUser.id)?'#ff4d4d':'#272727'; }
    likeBtn?.addEventListener('click', handleLike); dislikeBtn?.addEventListener('click', handleDislike);

async function renderLibrary() { if(!currentUser){ logout(); return; } const wl = getWatchLaterVideos(); const myPlaylists = playlists.filter(p=>p.userId===currentUser.id); const historyItems = [...watchHistory].filter(w=>w.userId===currentUser.id).sort((a,b)=>b.timestamp-a.timestamp); const historyVideos = historyItems.map(item=>videos.find(v=>v.id===item.videoId)).filter(v=>v); let html = `<div class="section-title"><i class="fas fa-clock"></i> Watch Later</div><div class="video-grid" id="wlGrid"></div><div class="section-title"><i class="fas fa-list"></i> Your Playlists</div><div id="userPlaylistsArea"></div><div class="section-title"><i class="fas fa-history"></i> Watch History</div><div class="video-grid" id="historyGrid"></div>`; document.getElementById('mainContainer').innerHTML = html; await renderVideoGrid(wl, 'wlGrid'); const area = document.getElementById('userPlaylistsArea'); if(myPlaylists.length===0) area.innerHTML='<div class="empty-state">📂 No playlists yet.</div>'; else{ area.innerHTML = myPlaylists.map(pl=>`<div style="background:#1e1e1e; margin:10px; border-radius:20px; padding:12px;"><strong>${escapeHtml(pl.name)}</strong><div class="video-grid" id="pl_${pl.id}"></div></div>`).join(''); for(let pl of myPlaylists){ const items = playlistItems.filter(i=>i.playlistId===pl.id).map(i=>videos.find(v=>v.id===i.videoId)).filter(v=>v); await renderVideoGrid(items, `pl_${pl.id}`); } } await renderVideoGrid(historyVideos, 'historyGrid'); if(historyVideos.length===0) document.getElementById('historyGrid').innerHTML='<div class="empty-state">📺 No watch history.</div>'; }
function renderNotificationBadge() { const myNotifs = notifications.filter(n=>n.userId===currentUser?.id && !n.read); const badge = document.getElementById('notifBadge'); if(badge){ if(myNotifs.length){ badge.innerText=myNotifs.length; badge.style.display='inline-block'; } else badge.style.display='none'; } const bell = document.getElementById('bellIcon'); if(bell) bell.onclick=()=>{ alert(notifications.filter(n=>n.userId===currentUser?.id).slice(0,10).map(n=>n.message).join('\n')||"No notifications"); notifications.forEach(n=>{ if(n.userId===currentUser?.id) n.read=true; }); saveAll(); renderNotificationBadge(); }; }
function setActiveNav(nav) { document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b=>b.dataset.nav===nav); if(btn) btn.classList.add('active'); }

// Bootstrap
async function bootstrap() {
    await initIndexedDB();
    loadAll();
    cleanFakeUsers();
    await Promise.all(videos.map(async v => { if(v.blobId) { const blob = await getVideoBlob(v.blobId); if(blob) v.blobUrl = URL.createObjectURL(blob); } }));
    const loggedIn = loadSessionFromStorage();
    if (!loggedIn) {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('mainHeader').style.display = 'none';
        document.querySelector('.container').style.display = 'none';
    } else {
        hideLoginOverlayAndShowApp();
    }
    const navHTML = `<button class="nav-btn active" data-nav="home">Home</button><button class="nav-btn" data-nav="trending">Trending</button><button class="nav-btn" data-nav="upload">Upload</button><button class="nav-btn" data-nav="library">Library</button>`;
    document.getElementById('navLinks').innerHTML = navHTML;
    document.querySelectorAll('.nav-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const nav=btn.dataset.nav; if(nav==='home') renderHome(); else if(nav==='trending') renderTrendingPage(); else if(nav==='upload') renderUploadPage(); else if(nav==='library') renderLibrary(); activeView=nav; setActiveNav(nav); }); });
    document.getElementById('homeLogo').onclick = () => { renderHome(); setActiveNav('home'); };
    document.getElementById('searchBtn').addEventListener('click', performSearch);
    document.getElementById('searchInput').addEventListener('input', performSearchDebounced);
    document.getElementById('searchInput').addEventListener('keypress', (e)=>e.key==='Enter' && performSearch());
    initGoogleSignIn();
}
bootstrap();
</script>
