<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MyZylox — Video Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #0f0f0f; color: #f1f1f1; }
        
        /* Login Overlay */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px; padding: 20px; }
        .login-card { background: #1c1c1c; border-radius: 32px; padding: 32px; text-align: center; max-width: 350px; width: 100%; }
        .login-card h1 { font-size: 2rem; margin-bottom: 16px; background: linear-gradient(135deg, #ff4d4d, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-card p { color: #aaa; margin-bottom: 24px; }
        .auth-btn { background: #ff4d4d; border: none; padding: 14px 28px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; width: 100%; font-size: 16px; }
        .auth-btn:active { transform: scale(0.98); }
        
        /* Header */
        .header { position: sticky; top: 0; background: #0f0f0fcc; backdrop-filter: blur(18px); border-bottom: 1px solid #272727; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; z-index: 110; }
        .logo-area { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo-icon { font-size: 28px; color: #ff4d4d; }
        .logo-text { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #ff4d4d, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .avatar { width: 38px; height: 38px; background: #ff6b4a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; background-size: cover; background-position: center; cursor: pointer; }
        
        /* Main */
        .container { max-width: 100%; padding: 16px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .video-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .video-card:active { transform: scale(0.98); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: #0a0a0a; display: flex; align-items: center; justify-content: center; color: #ff4d4d; }
        .card-info { padding: 10px; display: flex; gap: 10px; }
        .video-title { font-weight: 600; font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .creator-name { font-size: 0.7rem; color: #aaa; margin-top: 4px; }
        .stats { display: flex; gap: 12px; font-size: 0.7rem; color: #aaa; margin-top: 6px; }
        
        /* Upload */
        .upload-section { background: #141414; border-radius: 20px; padding: 16px; margin: 20px 0; }
        input, textarea { background: #2a2a2a; border: 1px solid #3a3a3a; padding: 12px 16px; border-radius: 40px; color: white; width: 100%; margin-bottom: 12px; outline: none; }
        
        /* Toast */
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #ff4d4d; padding: 12px; border-radius: 40px; text-align: center; z-index: 2001; animation: fadeInUp 0.2s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
        .section-title { font-size: 1.3rem; font-weight: 600; margin: 20px 0 12px 0; border-left: 4px solid #ff4d4d; padding-left: 12px; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h1>🎬 MyZylox</h1>
        <p>🌍 ඔබගේ Google ගිණුමෙන් පුරනය වන්න</p>
        <button id="googleSignInBtn" class="auth-btn">
            <i>🔐</i> Sign in with Google
        </button>
        <div style="margin-top: 16px; font-size: 11px; color: #666;">✨ සියලුම පරිශීලකයින්ගේ videos බලන්න පුළුවන් ✨</div>
    </div>
</div>

<!-- Main App -->
<div class="header" id="mainHeader" style="display: none;">
    <div class="logo-area" id="homeLogo">
        <span class="logo-icon">🎬</span>
        <span class="logo-text">MyZylox</span>
    </div>
    <div class="avatar" id="avatarBtn">👤</div>
</div>

<div class="container" id="mainContainer" style="display: none;"></div>

<script>
// Supabase Configuration
const SUPABASE_URL = "https://huzcuspzhqttbujcfpcw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_2Xxi-VeACFEGYziBBNSY4g_NK-Ki6rm";

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Global variables
let currentUser = null;
let videosList = [];
let usersList = [];
let likesList = [];

// Helper functions
function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = isError ? '#d32f2f' : '#ff4d4d';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function escapeHtml(str) {
    return String(str || '').replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// ==================== AUTHENTICATION ====================
async function handleGoogleSignIn() {
    try {
        showToast("Opening Google login...");
        
        // Use redirect instead of popup for better mobile compatibility
        const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + window.location.pathname
            }
        });
        
        if (error) {
            console.error("Auth error:", error);
            showToast("Login failed: " + error.message, true);
        }
    } catch (error) {
        console.error("Sign in error:", error);
        showToast("Error: " + error.message, true);
    }
}

async function checkSession() {
    const { data: { session }, error } = await supabase.auth.getSession();
    
    if (error) {
        console.error("Session error:", error);
        return false;
    }
    
    if (session) {
        console.log("User logged in:", session.user.email);
        
        // Save or update user in database
        const { error: upsertError } = await supabase
            .from('users')
            .upsert({
                id: session.user.id,
                email: session.user.email,
                display_name: session.user.user_metadata.full_name || session.user.email.split('@')[0],
                avatar_url: session.user.user_metadata.avatar_url
            });
        
        if (upsertError) console.error("User save error:", upsertError);
        
        currentUser = {
            id: session.user.id,
            email: session.user.email,
            displayName: session.user.user_metadata.full_name || session.user.email.split('@')[0],
            avatar: session.user.user_metadata.avatar_url
        };
        
        // Save session to localStorage
        localStorage.setItem('myzylox_session', JSON.stringify({ 
            userId: session.user.id, 
            expires: Date.now() + 7 * 24 * 60 * 60 * 1000 
        }));
        
        // Show main app
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainHeader').style.display = 'flex';
        document.querySelector('.container').style.display = 'block';
        
        await loadData();
        renderHome();
        updateAvatar();
        showToast(`Welcome ${currentUser.displayName}! 🎉`);
        return true;
    }
    return false;
}

// Listen for auth state changes (for redirect flow)
supabase.auth.onAuthStateChange((event, session) => {
    console.log("Auth event:", event);
    if (event === 'SIGNED_IN' && session) {
        window.location.reload();
    }
});

async function logout() {
    await supabase.auth.signOut();
    localStorage.removeItem('myzylox_session');
    currentUser = null;
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('mainHeader').style.display = 'none';
    document.querySelector('.container').style.display = 'none';
    showToast("Logged out");
}

function updateAvatar() {
    const avatar = document.getElementById('avatarBtn');
    if (avatar && currentUser) {
        if (currentUser.avatar) {
            avatar.style.backgroundImage = `url(${currentUser.avatar})`;
            avatar.style.backgroundSize = 'cover';
            avatar.innerHTML = '';
        } else {
            avatar.innerHTML = currentUser.displayName?.charAt(0) || '👤';
        }
        avatar.onclick = () => showChannelPage(currentUser.id);
    }
}

// ==================== DATA LOADING ====================
async function loadData() {
    try {
        const { data: users } = await supabase.from('users').select('*');
        usersList = users || [];
        
        const { data: videos } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
        videosList = videos || [];
        
        const { data: likes } = await supabase.from('likes').select('*');
        likesList = likes || [];
        
        console.log(`✅ Loaded: ${usersList.length} users, ${videosList.length} videos`);
    } catch (error) {
        console.error("Load error:", error);
    }
}

// ==================== VIDEO UPLOAD ====================
async function uploadVideo(title, file) {
    if (!title || !file) throw new Error("Title and file required");
    if (file.size > 200 * 1024 * 1024) throw new Error("Max 200 MB");
    
    showToast("📤 Uploading...");
    
    const videoId = `vid_${Date.now()}`;
    const fileName = `${videoId}_${Date.now()}.mp4`;
    
    // Upload to storage
    const { error: uploadError } = await supabase.storage
        .from('videos')
        .upload(fileName, file);
    
    if (uploadError) throw uploadError;
    
    // Get public URL
    const { data: { publicUrl } } = supabase.storage
        .from('videos')
        .getPublicUrl(fileName);
    
    // Save to database
    const { error: dbError } = await supabase
        .from('videos')
        .insert({
            id: videoId,
            user_id: currentUser.id,
            title: title,
            video_url: publicUrl,
            views: 0
        });
    
    if (dbError) throw dbError;
    
    // Update local list
    videosList.unshift({ 
        id: videoId, 
        user_id: currentUser.id, 
        title: title, 
        video_url: publicUrl,
        views: 0
    });
    
    showToast(`✅ "${title}" uploaded!`);
    renderHome();
}

// ==================== VIDEO GRID ====================
async function renderVideoGrid(videoArray, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    
    if (!videoArray || videoArray.length === 0) {
        container.innerHTML = '<div class="empty-state">✨ No videos yet. Be the first to upload!</div>';
        return;
    }
    
    for (let vid of videoArray) {
        const owner = usersList.find(u => u.id === vid.user_id);
        if (!owner) continue;
        
        const likeCount = likesList.filter(l => l.video_id === vid.id).length;
        
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <div class="thumbnail">
                🎬
            </div>
            <div class="card-info">
                <div>
                    <div class="video-title">${escapeHtml(vid.title)}</div>
                    <div class="creator-name">👤 ${escapeHtml(owner.display_name)}</div>
                    <div class="stats">
                        <span>👁️ ${vid.views || 0}</span>
                        <span>❤️ ${likeCount}</span>
                    </div>
                </div>
            </div>
        `;
        card.onclick = () => openWatchPage(vid);
        container.appendChild(card);
    }
}

// ==================== WATCH PAGE ====================
async function openWatchPage(video) {
    const owner = usersList.find(u => u.id === video.user_id);
    const likeCount = likesList.filter(l => l.video_id === video.id).length;
    const isLiked = currentUser ? likesList.some(l => l.video_id === video.id && l.user_id === currentUser.id) : false;
    
    let html = `
        <div style="margin-bottom: 20px;">
            <video src="${video.video_url}" style="width:100%; max-height:50vh;" controls autoplay></video>
            <h2 style="margin-top: 16px;">${escapeHtml(video.title)}</h2>
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 12px 0;">
                <strong>👤 ${escapeHtml(owner?.display_name)}</strong>
                <span>👁️ ${video.views || 0} views</span>
            </div>
            <div style="display: flex; gap: 12px; margin: 16px 0;">
                <button id="likeBtn" style="background: ${isLiked ? '#ff4d4d' : '#2a2a2a'}; border: none; padding: 8px 20px; border-radius: 40px; color: white;">
                    ❤️ ${likeCount}
                </button>
                <button onclick="renderHome()" style="background: #2a2a2a; border: none; padding: 8px 20px; border-radius: 40px; color: white;">
                    ⬅️ Back
                </button>
            </div>
        </div>
    `;
    document.getElementById('mainContainer').innerHTML = html;
    
    document.getElementById('likeBtn')?.addEventListener('click', async () => {
        if (!currentUser) { showToast("Sign in to like", true); return; }
        
        const alreadyLiked = likesList.some(l => l.video_id === video.id && l.user_id === currentUser.id);
        
        if (alreadyLiked) {
            await supabase.from('likes').delete().eq('video_id', video.id).eq('user_id', currentUser.id);
            const index = likesList.findIndex(l => l.video_id === video.id && l.user_id === currentUser.id);
            if (index !== -1) likesList.splice(index, 1);
        } else {
            await supabase.from('likes').insert({ video_id: video.id, user_id: currentUser.id });
            likesList.push({ video_id: video.id, user_id: currentUser.id });
        }
        openWatchPage(video);
    });
}

// ==================== HOME PAGE ====================
async function renderHome() {
    let html = `
        <div class="section-title">🔥 Latest Videos</div>
        <div class="video-grid" id="latestGrid"></div>
        ${currentUser ? `
        <div class="upload-section">
            <h3>📤 Upload Video</h3>
            <input type="text" id="uploadTitle" placeholder="Video title">
            <input type="file" id="uploadFile" accept="video/mp4,video/webm">
            <button id="doUploadBtn" class="auth-btn" style="width:100%;">Publish</button>
        </div>` : ''}
    `;
    document.getElementById('mainContainer').innerHTML = html;
    await renderVideoGrid(videosList.slice(0, 20), 'latestGrid');
    
    if (currentUser) {
        document.getElementById('doUploadBtn')?.addEventListener('click', async () => {
            const title = document.getElementById('uploadTitle').value.trim();
            const file = document.getElementById('uploadFile').files[0];
            if (title && file) {
                try {
                    await uploadVideo(title, file);
                } catch (e) {
                    showToast(e.message, true);
                }
            } else {
                showToast("Title and file required", true);
            }
        });
    }
}

async function showChannelPage(userId) {
    const channelUser = usersList.find(u => u.id === userId);
    const userVideos = videosList.filter(v => v.user_id === userId);
    
    let html = `
        <div style="background: #1e1e1e; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center;">
            <div style="width: 80px; height: 80px; background: #ff4d4d; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 12px;">
                👤
            </div>
            <h2>${escapeHtml(channelUser?.display_name)}</h2>
            <p>📹 ${userVideos.length} videos</p>
            <button onclick="renderHome()" class="auth-btn" style="margin-top: 12px;">⬅️ Back Home</button>
        </div>
        <div class="video-grid" id="channelVidGrid"></div>
    `;
    document.getElementById('mainContainer').innerHTML = html;
    await renderVideoGrid(userVideos, 'channelVidGrid');
}

// ==================== INITIALIZATION ====================
async function bootstrap() {
    // Setup event listeners
    document.getElementById('googleSignInBtn').onclick = () => handleGoogleSignIn();
    document.getElementById('homeLogo').onclick = () => renderHome();
    
    // Check for existing session
    const sess = localStorage.getItem('myzylox_session');
    if (sess) {
        try {
            const { userId, expires } = JSON.parse(sess);
            if (expires && expires > Date.now()) {
                await checkSession();
                return;
            }
        } catch(e) {}
    }
    
    // Try to get current session
    const loggedIn = await checkSession();
    
    if (!loggedIn) {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('mainHeader').style.display = 'none';
        document.querySelector('.container').style.display = 'none';
    }
}

// Start the app
bootstrap();
</script>
</body>
</html>
