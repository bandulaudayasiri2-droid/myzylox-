<script>
// ==================== SUPABASE CREDENTIALS ====================
const SUPABASE_URL = "https://huzcuspzhqttbujcfpcw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_2Xxi-VeACFEGYziBBNSY4g_NK-Ki6rm";

// Initialize Supabase
const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== GLOBAL VARIABLES ====================
const MAX_VIDEO_SIZE_MB = 200;
const ALLOWED_VIDEO_TYPES = ['video/mp4', 'video/webm', 'video/ogg'];

let currentUser = null;
let currentWatchVideo = null;
let activeView = "home";
let searchDebounceTimer = null;
let videosList = [];
let usersList = [];
let likesList = [];
let commentsList = [];
let userViewedVideos = new Set();

// ==================== HELPER FUNCTIONS ====================
function escapeHtml(str) { 
    return String(str || '').replace(/[&<>]/g, function(m){ 
        if(m==='&') return '&amp;'; 
        if(m==='<') return '&lt;'; 
        if(m==='>') return '&gt;'; 
        return m;
    }); 
}

function showToast(msg, isError=false) { 
    let toast = document.createElement('div'); 
    toast.className = 'toast'; 
    toast.style.background = isError ? '#d32f2f' : '#ff4d4d'; 
    toast.innerText = msg; 
    document.body.appendChild(toast); 
    setTimeout(() => toast.remove(), 3000); 
}

function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num.toString();
}

// ==================== DATA LOADING ====================
async function loadAllData() {
    try {
        const { data: users, error: usersError } = await supabase
            .from('users')
            .select('*');
        if (!usersError) usersList = users || [];
        
        const { data: videos, error: videosError } = await supabase
            .from('videos')
            .select('*')
            .order('created_at', { ascending: false });
        if (!videosError) videosList = videos || [];
        
        const { data: likes, error: likesError } = await supabase
            .from('likes')
            .select('*');
        if (!likesError) likesList = likes || [];
        
        const { data: comments, error: commentsError } = await supabase
            .from('comments')
            .select('*')
            .order('created_at', { ascending: false });
        if (!commentsError) commentsList = comments || [];
        
        console.log(`✅ Loaded: ${usersList.length} users, ${videosList.length} videos`);
        return true;
    } catch (error) {
        console.error("Error loading data:", error);
        return false;
    }
}

// ==================== AUTHENTICATION ====================
async function handleGoogleSignIn() {
    try {
        // Use popup instead of redirect for better UX
        const { data, error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + window.location.pathname
            }
        });
        if (error) throw error;
        // The popup will handle the rest
    } catch (error) {
        showToast("Sign-in failed: " + error.message, true);
    }
}

async function checkSession() {
    // Get current session
    const { data: { session }, error: sessionError } = await supabase.auth.getSession();
    
    if (sessionError) {
        console.error("Session error:", sessionError);
    }
    
    if (session) {
        // Check if user exists in database
        const { data: existingUser } = await supabase
            .from('users')
            .select('*')
            .eq('id', session.user.id)
            .single();
        
        if (!existingUser) {
            await supabase.from('users').insert({
                id: session.user.id,
                email: session.user.email,
                display_name: session.user.user_metadata.full_name || session.user.email.split('@')[0],
                avatar_url: session.user.user_metadata.avatar_url
            });
        }
        
        currentUser = {
            id: session.user.id,
            email: session.user.email,
            displayName: session.user.user_metadata.full_name || session.user.email.split('@')[0],
            avatar: session.user.user_metadata.avatar_url
        };
        
        localStorage.setItem('myzylox_session', JSON.stringify({ 
            userId: session.user.id, 
            expires: Date.now() + 7 * 24 * 60 * 60 * 1000 
        }));
        
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainHeader').style.display = 'flex';
        document.querySelector('.container').style.display = 'block';
        await loadAllData();
        updateUIUser();
        renderHome();
        showToast(`Welcome ${currentUser.displayName}! 🌍`);
        return true;
    }
    return false;
}

// Listen for auth state changes
supabase.auth.onAuthStateChange(async (event, session) => {
    console.log("Auth event:", event);
    if (event === 'SIGNED_IN' && session) {
        await checkSession();
    } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('mainHeader').style.display = 'none';
        document.querySelector('.container').style.display = 'none';
    }
});

async function logout() {
    await supabase.auth.signOut();
    localStorage.removeItem('myzylox_session');
    currentUser = null;
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('mainHeader').style.display = 'none';
    document.querySelector('.container').style.display = 'none';
    showToast("Logged out successfully.");
}

function updateUIUser() {
    const area = document.getElementById('userArea');
    if (!area || !currentUser) return;
    const avatarStyle = currentUser.avatar ? `background-image: url(${currentUser.avatar}); background-size: cover;` : '';
    area.innerHTML = `
        <button id="uploadNavBtn" class="icon-btn"><i class="fas fa-upload"></i></button>
        <div class="avatar" id="avatarBtn" style="${avatarStyle}">${currentUser.avatar ? '' : (currentUser.displayName?.charAt(0) || 'U')}</div>
        <button id="logoutBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
    `;
    document.getElementById('logoutBtn').onclick = () => logout();
    document.getElementById('avatarBtn').onclick = () => showChannelPage(currentUser.id);
    document.getElementById('uploadNavBtn').onclick = () => { renderUploadPage(); activeView = 'upload'; setActiveNav('upload'); };
}

// ==================== VIDEO UPLOAD ====================
async function generateThumbnailBlob(file) {
    return new Promise((resolve) => {
        const video = document.createElement('video');
        video.preload = 'metadata';
        video.muted = true;
        video.src = URL.createObjectURL(file);
        video.onloadeddata = () => {
            video.currentTime = 1;
            video.onseeked = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 360;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                canvas.toBlob((blob) => {
                    resolve(blob);
                    URL.revokeObjectURL(video.src);
                }, 'image/jpeg', 0.7);
            };
            if (video.readyState >= 2) video.currentTime = 1;
            else video.oncanplay = () => { video.currentTime = 1; };
        };
        video.onerror = () => resolve(null);
    });
}

async function uploadVideo(title, file) {
    if (!title || !file) throw new Error("Missing title or file");
    if (!ALLOWED_VIDEO_TYPES.includes(file.type)) throw new Error("Invalid format. Use MP4, WebM, or OGG");
    if (file.size > MAX_VIDEO_SIZE_MB * 1024 * 1024) throw new Error(`Max ${MAX_VIDEO_SIZE_MB} MB`);
    
    showToast("📤 Uploading video to cloud...");
    
    try {
        const videoId = `vid_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
        const fileExt = file.name.split('.').pop();
        const fileName = `${videoId}.${fileExt}`;
        
        const { error: uploadError } = await supabase.storage
            .from('videos')
            .upload(fileName, file, {
                cacheControl: '3600',
                upsert: false
            });
        
        if (uploadError) throw uploadError;
        
        const { data: { publicUrl } } = supabase.storage
            .from('videos')
            .getPublicUrl(fileName);
        
        const thumbnailBlob = await generateThumbnailBlob(file);
        let thumbnailUrl = '';
        if (thumbnailBlob) {
            const thumbName = `${videoId}_thumb.jpg`;
            const { error: thumbError } = await supabase.storage
                .from('videos')
                .upload(thumbName, thumbnailBlob);
            if (!thumbError) {
                const { data: { publicUrl: thumbPublicUrl } } = supabase.storage
                    .from('videos')
                    .getPublicUrl(thumbName);
                thumbnailUrl = thumbPublicUrl;
            }
        }
        
        let duration = "0:00";
        const tempVideo = document.createElement('video');
        tempVideo.preload = 'metadata';
        tempVideo.src = URL.createObjectURL(file);
        await new Promise((resolve) => {
            tempVideo.onloadedmetadata = () => {
                const mins = Math.floor(tempVideo.duration / 60);
                const secs = Math.floor(tempVideo.duration % 60);
                duration = `${mins}:${secs.toString().padStart(2, '0')}`;
                resolve();
            };
            tempVideo.onerror = () => resolve();
        });
        
        const { error: dbError } = await supabase
            .from('videos')
            .insert({
                id: videoId,
                user_id: currentUser.id,
                title: escapeHtml(title).substring(0, 100),
                video_url: publicUrl,
                thumbnail_url: thumbnailUrl,
                duration: duration,
                views: 0
            });
        
        if (dbError) throw dbError;
        
        videosList.unshift({ 
            id: videoId, 
            user_id: currentUser.id, 
            title: title, 
            video_url: publicUrl,
            thumbnail_url: thumbnailUrl,
            duration: duration,
            views: 0
        });
        
        showToast(`✅ "${title}" uploaded! Now visible to everyone!`);
        return true;
        
    } catch (error) {
        console.error("Upload error:", error);
        throw new Error("Upload failed: " + error.message);
    }
}

// ==================== VIEWS SYSTEM ====================
async function recordView(videoId) {
    if (!currentUser) return;
    
    const viewKey = `${currentUser.id}_${videoId}`;
    if (userViewedVideos.has(viewKey)) return;
    
    userViewedVideos.add(viewKey);
    
    try {
        const { data: video } = await supabase
            .from('videos')
            .select('views')
            .eq('id', videoId)
            .single();
        
        if (video) {
            await supabase
                .from('videos')
                .update({ views: (video.views || 0) + 1 })
                .eq('id', videoId);
            
            const localVideo = videosList.find(v => v.id === videoId);
            if (localVideo) localVideo.views = (localVideo.views || 0) + 1;
        }
    } catch (error) {
        console.error("Error recording view:", error);
    }
}

// ==================== LIKES SYSTEM ====================
async function toggleLike(videoId) {
    if (!currentUser) return false;
    
    const alreadyLiked = likesList.some(l => l.video_id === videoId && l.user_id === currentUser.id);
    
    if (alreadyLiked) {
        const { error } = await supabase
            .from('likes')
            .delete()
            .eq('video_id', videoId)
            .eq('user_id', currentUser.id);
        
        if (!error) {
            likesList = likesList.filter(l => !(l.video_id === videoId && l.user_id === currentUser.id));
        }
        return false;
    } else {
        const { error } = await supabase
            .from('likes')
            .insert({ video_id: videoId, user_id: currentUser.id });
        
        if (!error) {
            likesList.push({ video_id: videoId, user_id: currentUser.id });
        }
        return true;
    }
}

// ==================== COMMENTS SYSTEM ====================
async function addComment(videoId, content) {
    if (!currentUser) return false;
    if (!content || content.trim().length === 0) return false;
    if (content.length > 500) {
        showToast("Comment too long (max 500 characters)", true);
        return false;
    }
    
    const commentId = `c_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
    
    const { error } = await supabase
        .from('comments')
        .insert({
            id: commentId,
            video_id: videoId,
            user_id: currentUser.id,
            content: escapeHtml(content.trim())
        });
    
    if (!error) {
        commentsList.unshift({
            id: commentId,
            video_id: videoId,
            user_id: currentUser.id,
            content: escapeHtml(content.trim()),
            created_at: new Date().toISOString()
        });
        return true;
    }
    return false;
}

// ==================== VIDEO GRID RENDERING ====================
async function renderVideoGrid(videoArray, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    
    if (!videoArray || videoArray.length === 0) { 
        container.innerHTML = '<div class="empty-state">✨ No videos yet. Be the first to upload!</div>'; 
        return; 
    }
    
    for (let vid of videoArray) {
        const owner = usersList.find(u => u.id === vid.user_id);
        if (!owner) continue;
        
        const thumbUrl = vid.thumbnail_url || '';
        const likeCount = likesList.filter(l => l.video_id === vid.id).length;
        const viewCount = vid.views || 0;
        
        const card = document.createElement('div'); 
        card.className = 'video-card';
        card.innerHTML = `
            <div class="thumbnail">
                <img loading="lazy" src="${thumbUrl || 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 16 9\'%3E%3Crect width=\'100%25\' height=\'100%25\' fill=\'%23222\'/%3E%3C/svg%3E'}" alt="thumb">
                <span class="duration-badge">${vid.duration || '0:00'}</span>
            </div>
            <div class="card-info">
                <div class="channel-avatar-mini" style="${owner.avatar_url ? `background-image:url(${owner.avatar_url});background-size:cover;` : ''}">${owner.avatar_url ? '' : (owner.display_name?.charAt(0) || 'U')}</div>
                <div class="video-details">
                    <div class="video-title">${escapeHtml(vid.title)}</div>
                    <div class="creator-name" data-user="${vid.user_id}"><i class="fas fa-user-circle"></i> ${escapeHtml(owner.display_name)}</div>
                    <div class="stats-row">
                        <span><i class="fas fa-eye"></i> ${formatNumber(viewCount)}</span>
                        <span><i class="fas fa-thumbs-up"></i> ${formatNumber(likeCount)}</span>
                    </div>
                </div>
            </div>
        `;
        
        card.querySelector('.thumbnail').addEventListener('click', () => openWatchPage(vid));
        card.querySelector('.creator-name').addEventListener('click', (e) => { 
            e.stopPropagation(); 
            showChannelPage(vid.user_id); 
        });
        container.appendChild(card);
    }
}

// ==================== WATCH PAGE ====================
async function openWatchPage(video) { 
    if (!video) return;
    currentWatchVideo = video;
    activeView = 'watch';
    
    await recordView(video.id);
    await renderWatchView();
}

async function renderWatchView() {
    const vid = currentWatchVideo;
    const owner = usersList.find(u => u.id === vid.user_id);
    if (!owner) { renderHome(); return; }
    
    const likeCount = likesList.filter(l => l.video_id === vid.id).length;
    const isLikedByUser = currentUser ? likesList.some(l => l.video_id === vid.id && l.user_id === currentUser.id) : false;
    const commentList = commentsList.filter(c => c.video_id === vid.id);
    const viewCount = vid.views || 0;
    
    let html = `
        <div class="watch-container">
            <div class="watch-main">
                <div class="watch-player" id="customPlayerContainer">
                    <video id="watchVideoPlayer" src="${vid.video_url}" style="width:100%;" autoplay controls controlsList="nodownload"></video>
                </div>
                <div class="video-meta">
                    <h2>${escapeHtml(vid.title)}</h2>
                    <div class="stats-row" style="margin-top: 8px;">
                        <span><i class="fas fa-eye"></i> ${formatNumber(viewCount)} views</span>
                    </div>
                </div>
                <div class="channel-info">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div class="channel-avatar-mini" style="width: 48px; height: 48px; ${owner.avatar_url ? `background-image:url(${owner.avatar_url});background-size:cover;` : ''}">${owner.avatar_url ? '' : (owner.display_name?.charAt(0) || 'U')}</div>
                        <div><strong style="font-size: 1.1rem;">${escapeHtml(owner.display_name)}</strong></div>
                    </div>
                </div>
                <div class="actions">
                    <button id="likeBtnWatch" class="action-btn" style="background:${isLikedByUser ? '#ff4d4d' : '#272727'}">
                        <i class="fas fa-thumbs-up"></i> <span id="likeCount">${formatNumber(likeCount)}</span>
                    </button>
                </div>
                <div>
                    <h4>Comments (${commentList.length})</h4>
                    <div id="commentsWatchArea"></div>
                    ${currentUser ? `
                    <div style="display:flex; gap:8px; margin-top:12px;">
                        <input type="text" id="newCommentInput" placeholder="Add a comment..." maxlength="500">
                        <button id="postCommentWatch" class="auth-btn">Post</button>
                    </div>
                    <div style="font-size: 11px; color: #666; margin-top: 4px;">Max 500 characters</div>
                    ` : '<p style="color: #666; margin-top: 12px;">Sign in to comment</p>'}
                </div>
            </div>
            <div class="watch-sidebar">
                <div class="section-title">Recommended</div>
                <div id="recSidebarGrid"></div>
            </div>
        </div>
    `;
    
    document.getElementById('mainContainer').innerHTML = html;
    
    const commentsContainer = document.getElementById('commentsWatchArea');
    commentsContainer.innerHTML = commentList.map(c => {
        const user = usersList.find(u => u.id === c.user_id);
        const date = c.created_at ? new Date(c.created_at).toLocaleDateString() : 'recent';
        return `
            <div class="comment-item">
                <strong>${escapeHtml(user?.display_name || 'Unknown')}</strong>
                <span style="font-size: 11px; color: #888; margin-left: 8px;">${date}</span>
                <div style="margin-top: 6px;">${escapeHtml(c.content)}</div>
            </div>
        `;
    }).join('');
    
    const recs = videosList.filter(v => v.id !== vid.id).slice(0, 8);
    await renderVideoGrid(recs, 'recSidebarGrid');
    
    document.getElementById('likeBtnWatch')?.addEventListener('click', async () => {
        if (!currentUser) { logout(); return; }
        const newLikedState = await toggleLike(vid.id);
        const newLikeCount = likesList.filter(l => l.video_id === vid.id).length;
        document.getElementById('likeCount').innerText = formatNumber(newLikeCount);
        document.getElementById('likeBtnWatch').style.background = newLikedState ? '#ff4d4d' : '#272727';
    });
    
    document.getElementById('postCommentWatch')?.addEventListener('click', async () => {
        if (!currentUser) return;
        const txt = document.getElementById('newCommentInput').value.trim();
        if (txt) {
            const success = await addComment(vid.id, txt);
            if (success) {
                document.getElementById('newCommentInput').value = '';
                await loadAllData();
                renderWatchView();
                showToast("Comment added!");
            } else {
                showToast("Failed to add comment", true);
            }
        }
    });
}

// ==================== HOME PAGE ====================
async function renderHome() { 
    activeView = 'home'; 
    const allVideos = [...videosList];
    const latest = allVideos.slice(0, 12);
    
    let html = `
        <div class="section-title"><i class="fas fa-fire"></i> Latest Uploads 🌍</div>
        <div class="video-grid" id="latestGrid"></div>
        <div class="section-title"><i class="fas fa-magic"></i> All Videos (Global)</div>
        <div class="video-grid" id="allVideosGrid"></div>
        ${currentUser ? `
        <div class="upload-section">
            <h3>📤 Quick Upload to Cloud</h3>
            <input type="text" id="uploadTitle" placeholder="Video title">
            <div id="dropzone" class="upload-dropzone" style="margin-bottom: 12px;">
                <i class="fas fa-cloud-upload-alt fa-2x"></i>
                <p>Drag & drop or click to select video</p>
                <p style="font-size: 12px; color: #888;">Max ${MAX_VIDEO_SIZE_MB} MB · MP4, WebM, OGG</p>
            </div>
            <input type="file" id="uploadFile" accept="video/mp4,video/webm,video/ogg" style="display: none;">
            <button id="doUploadBtn" class="auth-btn">Publish to Cloud</button>
        </div>` : ''}
    `; 
    document.getElementById('mainContainer').innerHTML = html; 
    await renderVideoGrid(latest, 'latestGrid'); 
    await renderVideoGrid(allVideos, 'allVideosGrid');
    
    if (currentUser) {
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('uploadFile');
        
        dropzone?.addEventListener('click', () => fileInput.click());
        dropzone?.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
        dropzone?.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
        dropzone?.addEventListener('drop', async (e) => { 
            e.preventDefault(); 
            dropzone.classList.remove('drag-over'); 
            const file = e.dataTransfer.files[0]; 
            if (file && ALLOWED_VIDEO_TYPES.includes(file.type)) {
                const title = document.getElementById('uploadTitle').value.trim();
                if (title) {
                    try { 
                        await uploadVideo(title, file); 
                        await loadAllData();
                        renderHome(); 
                    } catch(e) { showToast(e.message, true); }
                } else {
                    showToast("Enter a title first", true);
                }
            } else {
                showToast("Invalid file format", true);
            }
        });
        
        fileInput?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const title = document.getElementById('uploadTitle').value.trim();
            if (title && file) {
                try { 
                    await uploadVideo(title, file); 
                    await loadAllData();
                    renderHome(); 
                } catch(e) { showToast(e.message, true); }
            } else if (!title) {
                showToast("Enter a title first", true);
            }
        });
        
        document.getElementById('doUploadBtn')?.addEventListener('click', async () => { 
            const title = document.getElementById('uploadTitle').value.trim(); 
            const file = document.getElementById('uploadFile').files[0]; 
            if (title && file) { 
                try { 
                    await uploadVideo(title, file); 
                    await loadAllData();
                    renderHome(); 
                } catch(e) { showToast(e.message, true); }
            } else { 
                showToast("Title and file required", true); 
            } 
        });
    }
}

// ==================== CHANNEL PAGE ====================
async function showChannelPage(userId) { 
    activeView = 'channel'; 
    const channelUser = usersList.find(u => u.id === userId); 
    if (!channelUser) { renderHome(); return; } 
    const userVideos = videosList.filter(v => v.user_id === userId);
    
    let html = `
        <div style="background:linear-gradient(145deg,#1e1e1e,#0f0f0f); border-radius:28px; padding:32px; margin-bottom:32px; display:flex; gap:24px; flex-wrap:wrap; align-items:center;">
            <div style="width:90px;height:90px;background:#ff4d4d;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;background-image:url(${channelUser.avatar_url || ''});background-size:cover;">${channelUser.avatar_url ? '' : (channelUser.display_name?.charAt(0) || 'U')}</div>
            <div>
                <h2>${escapeHtml(channelUser.display_name)}</h2>
                <p>${channelUser.email || ''}</p>
                <div>📹 ${userVideos.length} videos</div>
            </div>
        </div>
        <div class="section-title">Videos</div>
        <div class="video-grid" id="channelVidGrid"></div>
    `; 
    document.getElementById('mainContainer').innerHTML = html; 
    await renderVideoGrid(userVideos, 'channelVidGrid'); 
}

// ==================== UPLOAD PAGE ====================
async function renderUploadPage() {
    if (!currentUser) { logout(); return; }
    let html = `
        <div class="section-title"><i class="fas fa-upload"></i> Upload to Cloud</div>
        <div class="upload-section">
            <div id="dropzone" class="upload-dropzone">
                <i class="fas fa-cloud-upload-alt fa-3x"></i>
                <p>Drag & drop or click to select video</p>
                <p style="font-size: 12px; color: #888;">Max ${MAX_VIDEO_SIZE_MB} MB · MP4, WebM, OGG</p>
            </div>
            <input type="file" id="uploadFileInput" accept="video/mp4,video/webm,video/ogg" style="display:none;">
            <input type="text" id="uploadTitleInput" placeholder="Video title" maxlength="100">
            <button id="doUploadBtnPage" class="auth-btn">Publish to Cloud</button>
        </div>
        <div class="section-title">Your Uploads</div>
        <div class="video-grid" id="myUploadsGrid"></div>
    `;
    document.getElementById('mainContainer').innerHTML = html;
    
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('uploadFileInput');
    
    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', async (e) => { 
        e.preventDefault(); 
        dropzone.classList.remove('drag-over'); 
        const file = e.dataTransfer.files[0]; 
        if (file) await performUpload(file);
    });
    
    fileInput.addEventListener('change', async (e) => { if (e.target.files[0]) await performUpload(e.target.files[0]); });
    
    async function performUpload(file) {
        const title = document.getElementById('uploadTitleInput').value.trim();
        if (!title) { showToast("Enter title", true); return; }
        try { 
            await uploadVideo(title, file); 
            showToast("Uploaded to cloud! Now visible to everyone."); 
            await loadAllData();
            renderUploadPage();
        } catch(e) { showToast(e.message, true); }
    }
    
    document.getElementById('doUploadBtnPage').addEventListener('click', async () => {
        const title = document.getElementById('uploadTitleInput').value.trim();
        const file = fileInput.files[0];
        if (title && file) await performUpload(file);
        else showToast("Title & file required", true);
    });
    
    const myVideos = videosList.filter(v => v.user_id === currentUser.id);
    await renderVideoGrid(myVideos, 'myUploadsGrid');
}

// ==================== SEARCH ====================
async function performSearch() { 
    const q = document.getElementById('searchInput').value.toLowerCase().trim(); 
    if (!q) { renderHome(); return; } 
    const results = videosList.filter(v => 
        v.title.toLowerCase().includes(q) || 
        (usersList.find(u => u.id === v.user_id)?.display_name?.toLowerCase().includes(q))
    ); 
    document.getElementById('mainContainer').innerHTML = `
        <div class="section-title">🔍 Results for "${escapeHtml(q)}"</div>
        <div class="video-grid" id="searchGrid"></div>
    `; 
    await renderVideoGrid(results, 'searchGrid'); 
    activeView = 'search'; 
}

function performSearchDebounced() {
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => performSearch(), 300);
}

function setActiveNav(nav) { 
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); 
    const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.dataset.nav === nav); 
    if (btn) btn.classList.add('active'); 
}

// ==================== INITIALIZATION ====================
async function bootstrap() {
    const navHTML = `
        <button class="nav-btn active" data-nav="home">Home</button>
        <button class="nav-btn" data-nav="upload">Upload</button>
    `;
    document.getElementById('navLinks').innerHTML = navHTML;
    document.querySelectorAll('.nav-btn').forEach(btn => { 
        btn.addEventListener('click', () => { 
            const nav = btn.dataset.nav; 
            if (nav === 'home') renderHome(); 
            else if (nav === 'upload') renderUploadPage(); 
            activeView = nav; 
            setActiveNav(nav); 
        }); 
    });
    document.getElementById('homeLogo').onclick = () => { renderHome(); setActiveNav('home'); };
    document.getElementById('searchBtn').addEventListener('click', performSearch);
    document.getElementById('searchInput').addEventListener('input', performSearchDebounced);
    document.getElementById('googleSignInBtn').onclick = () => handleGoogleSignIn();
    
    // Check for existing session
    const sessionExists = await checkSession();
    
    if (!sessionExists) {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('mainHeader').style.display = 'none';
        document.querySelector('.container').style.display = 'none';
    }
}

bootstrap();
</script>
